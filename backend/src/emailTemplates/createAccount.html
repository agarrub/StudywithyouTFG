<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creación de cuenta</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f4f4f7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
      }
      .wrapper {
        width: 100%;
        padding: 40px 0;
        background-color: #f4f4f7;
      }
      .container {
        max-width: 560px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 16px;
        border: 1px solid #e0e0e0;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      .header {
        background-color: #6c3fc5;
        padding: 30px 20px;
        text-align: center;
      }
      .header img {
        width: 48px;
        height: 48px;
      }
      .header h1 {
        color: #ffffff;
        font-size: 22px;
        font-weight: 600;
        margin: 12px 0 0;
      }
      .content {
        padding: 36px 40px;
        text-align: center;
      }
      .content h2 {
        font-size: 20px;
        color: #1a1a2e;
        margin: 0 0 16px;
      }
      .content p {
        font-size: 15px;
        line-height: 1.6;
        color: #555555;
        margin: 0 0 14px;
      }
      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 14px 32px;
        background-color: #6c3fc5;
        color: #ffffff;
        text-decoration: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
      }
      .footer {
        padding: 20px;
        text-align: center;
        font-size: 12px;
        color: #999999;
      }
    </style>
  </head>
  <body>
    <table class="wrapper" width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center">
          <table class="container" width="560" cellpadding="0" cellspacing="0" role="presentation">
            <tr>
              <td class="header">
                <img src="[LOGO]" alt="Logo" />
                <h1>Creación de cuenta</h1>
              </td>
            </tr>
            <tr>
              <td class="content">
                <h2>¡Bienvenido, {user}!</h2>
                <p>
                  ¡Solo queda un paso para que active su cuenta, pulse el botón
                  de abajo para crearla!
                </p>
                <p>
                  Si usted no ha creado esta cuenta, contacte al remitente para
                  eliminar su correo de nuestra base de datos.
                </p>
                <a href="{link}" class="btn">Crear cuenta</a>
              </td>
            </tr>
            <tr>
              <td class="footer">
                StudyWithYou &copy; 2026
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
